schemaVersion: 1
slug: test-challenge
title: 构建 Mini Redis
description: 从 RESP 协议解析开始，实现 PING、ECHO、SET 和 GET，完成一个可测试的 Redis-like 内存服务。
difficulty: medium
icon: database
outcome: 实现一个支持基础 Redis 命令的内存键值服务，并理解 RESP 请求/响应格式。
estimatedHours: 4
visibility: public
prerequisites:
  - Python 或 C++ 基础语法
  - TCP/socket 基本概念
learningGoals:
  - 解析 RESP 数组和批量字符串
  - 设计命令分发循环
  - 实现基础内存键值读写

languages:
  - key: python
    title: Python
    starterTemplate: starter_templates/python
    dockerfile: dockerfiles/python.Dockerfile
    solutionPath: solutions/python
  - key: cpp
    title: C++
    starterTemplate: starter_templates/cpp
    dockerfile: dockerfiles/cpp.Dockerfile
    solutionPath: solutions/cpp

tester:
  repo: git@github.com:codeforge-ink/test-challenge-course-tester.git
  tag: v0.1.0

stages:
  - slug: resp-parser
    title: 解析 RESP 请求
    file: stages/01-resp-parser.md
    difficulty: easy
  - slug: ping-echo
    title: 实现 PING 和 ECHO
    file: stages/02-ping-echo.md
    difficulty: easy
  - slug: set-get
    title: 实现 SET 和 GET
    file: stages/03-set-get.md
    difficulty: medium
